<script>
(async function () {
  await GTP.load();
  const reviews = await GTP.loadReviews();

  const board = document.getElementById('clues');
  const hasReviews = g => Array.isArray(reviews[g.id]) && reviews[g.id].length > 0;

  // If reviews haven't been generated yet, show a friendly notice.
  const anyReviews = GTP.games.some(hasReviews);
  if (!anyReviews) {
    document.getElementById('play').style.display = 'none';
    board.innerHTML = '<div class="panel center"><div style="font-size:40px">\u2B50</div>' +
      '<h2>Reviews aren\u2019t loaded yet</h2>' +
      '<p class="small">Run <code>scripts/enrich_reviews.py</code> to pull positive Store reviews.</p>' +
      '<div style="margin-top:14px"><a class="btn primary" href="index.html">\uD83C\uDFE0 More modes</a></div></div>';
    return;
  }

  // Mask the game's title words inside review text so it isn't a giveaway.
  function maskTitle(text, title) {
    if (!text) return '';
    const words = GTP.norm(title).split(' ').filter(w => w.length > 2);
    let out = text;
    words.forEach(w => {
      const re = new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\w*', 'gi');
      out = out.replace(re, '\u2588\u2588\u2588');
    });
    // also mask the whole (possibly multi-word) title if it survived word-splitting
    return out;
  }

  function stars(n) {
    let s = '';
    for (let i = 0; i < 5; i++) s += (i < n) ? '\u2605' : '\u2606';
    return s;
  }

  function reviewCard(rev, title, revealed) {
    const body = revealed ? rev.text : maskTitle(rev.text, title);
    const heading = revealed ? GTPEngine.escapeHtml(rev.title || 'Player review')
      : GTPEngine.escapeHtml(maskTitle(rev.title || 'Player review', title));
    return '<div class="reviewcard">' +
      '<div class="rc-top"><span class="rc-stars">' + stars(rev.rating) + '</span>' +
      (rev.helpful ? '<span class="rc-helpful">\uD83D\uDC4D ' + rev.helpful + '</span>' : '') + '</div>' +
      (heading ? '<div class="rc-title">' + heading + '</div>' : '') +
      '<p class="rc-text">\u201C' + GTPEngine.escapeHtml(body) + '\u201D</p>' +
      '</div>';
  }

  // Rank reviews by how much they actually describe the GAME (mechanics, story,
  // setting, characters...) versus generic praise ("best game ever"). The score
  // is measured on the MASKED text, since that's what the player sees, so the
  // hardest difficulty (which reveals just one review) leads with the most
  // informative, clue-rich review instead of an empty superlative.
  const SPECIFIC = new RegExp('\\b(' + [
    'story', 'stories', 'plot', 'narrative', 'character', 'characters', 'protagonist',
    'gameplay', 'combat', 'mechanic', 'mechanics', 'level', 'levels', 'world', 'open.?world',
    'graphic', 'graphics', 'visual', 'visuals', 'soundtrack', 'music', 'multiplayer', 'co.?op',
    'campaign', 'mission', 'missions', 'puzzle', 'puzzles', 'boss', 'bosses', 'weapon', 'weapons',
    'map', 'maps', 'quest', 'quests', 'craft', 'crafting', 'build', 'building', 'racing', 'race',
    'shooter', 'rpg', 'platformer', 'platforming', 'dialogue', 'voice', 'acting', 'physics',
    'control', 'controls', 'difficulty', 'enemy', 'enemies', 'loot', 'skill', 'skills', 'upgrade',
    'upgrades', 'exploration', 'explore', 'atmosphere', 'horror', 'survival', 'strategy', 'tactical',
    'turn.?based', 'roguelike', 'sandbox', 'zombie', 'zombies', 'dragon', 'magic', 'space', 'war',
    'dungeon', 'dungeons', 'inventory', 'stealth', 'parkour', 'leveling', 'grind', 'grinding',
    'dlc', 'expansion', 'update', 'server', 'servers', 'online', 'offline', 'pvp', 'pve', 'coop',
    'hero', 'heroes', 'villain', 'ending', 'chapter', 'episode', 'sequel', 'prequel', 'remake',
    'remaster', 'franchise', 'series', 'setting', 'lore', 'faction', 'class', 'classes', 'build',
    'crew', 'ship', 'ships', 'car', 'cars', 'track', 'tracks', 'gun', 'guns', 'sword', 'armor',
    'spell', 'spells', 'monster', 'monsters', 'planet', 'city', 'island', 'kingdom', 'battle',
    'battles', 'fight', 'fighting', 'puzzle', 'crafting', 'base', 'resource', 'resources',
  ].join('|') + ')\\b', 'gi');
  const GENERIC = new RegExp('\\b(' + [
    'best', 'amazing', 'awesome', 'great', 'good', 'nice', 'love', 'loved', 'lovely', 'fun',
    'fantastic', 'perfect', 'masterpiece', 'must.?(buy|play|have|get)', 'recommend', 'recommended',
    'worth', 'favorite', 'favourite', 'incredible', 'excellent', 'beautiful', 'gem', 'goty',
    'wonderful', 'brilliant', 'enjoyed', 'enjoy', 'enjoyable', 'cool', 'wow', 'thanks', 'thank',
    'buy.?it', 'get.?it', 'solid', 'nostalgia', 'nostalgic', 'classic',
  ].join('|') + ')\\b', 'gi');

  function infoScore(rev, title) {
    const masked = maskTitle(((rev.title ? rev.title + '. ' : '') + (rev.text || '')), title);
    // Words the player can actually read (drop fully-masked title tokens).
    const words = masked.replace(/[\u2588]+/g, ' ').split(/\s+/).filter(Boolean);
    const wc = words.length;
    const specific = (masked.match(SPECIFIC) || []).length;
    const generic = (masked.match(GENERIC) || []).length;
    let s = 0;
    s += Math.min(wc, 70) * 0.5;           // reward substance, capped
    s += specific * 6;                     // reward concrete, game-specific talk
    s -= generic * 2;                      // penalise empty praise
    if (wc < 6) s -= 25;                   // too short to be a useful clue
    if (specific === 0 && wc < 14) s -= 8; // short and says nothing concrete
    s += Math.min(rev.helpful || 0, 25) * 0.15; // mild community tiebreaker
    return s;
  }

  // Sort every game's reviews descriptive-first (deterministic, so daily mode is
  // stable). Ties keep original most-helpful order via a stable-ish index nudge.
  Object.keys(reviews).forEach(id => {
    const g = GTP.games.find(x => x.id === id);
    const title = g ? g.title : '';
    reviews[id] = reviews[id]
      .map((r, i) => ({ r: r, i: i, s: infoScore(r, title) }))
      .sort((a, b) => (b.s - a.s) || (a.i - b.i))
      .map(o => o.r);
  });

  GTPEngine.createGame({
    mode: 'review',
    title: 'Review',
    maxGuesses: 4,
    poolFilter: hasReviews,
    hint: function (g) {
      const inits = g.title.split(/\s+/)
        .map(w => { const m = w.match(/[A-Za-z0-9]/); return m ? m[0].toUpperCase() : ''; })
        .filter(Boolean).join('. ');
      const bits = [];
      if (g.category) bits.push(g.category);
      if (g.year) bits.push('' + g.year);
      bits.push('Initials: ' + inits);
      return bits.join('  \u2022  ');
    },
    reveal: function (step, answer, stageEl, cluesEl, done) {
      const revs = reviews[answer.id] || [];
      const shown = done ? revs.length : Math.min(step + 1, revs.length);
      let html = '';
      for (let i = 0; i < shown; i++) {
        html += reviewCard(revs[i], answer.title, done);
      }
      cluesEl.innerHTML = html || '<div class="small center">No review available.</div>';
    },
  });
})();
</script>
