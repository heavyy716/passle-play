<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420">
  <defs>
    <filter id="m" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.045" numOctaves="3" seed="11" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4" intercept="0"/></feComponentTransfer>
    </filter>
    <filter id="s" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.006 0.6" numOctaves="2" seed="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
    </filter>
    <linearGradient id="lit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="0.5" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
  </defs>
  <rect width="420" height="420" fill="#141310"/>
  <rect width="420" height="420" filter="url(#m)"/>
  <rect width="420" height="420" filter="url(#s)"/>
  <rect width="420" height="420" fill="url(#lit)"/>
</svg>
