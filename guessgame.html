<script>
(async function () {
  await GTP.load();
  const stage = document.getElementById('stage');
  const img = document.createElement('img');
  img.crossOrigin = 'anonymous';
  // Different full screenshots each guess — show them whole & sharp.
  img.style.transition = 'opacity .35s ease';
  stage.appendChild(img);

  const MAX = 6;

  // Hide the answer's own words inside any hint text so a clue never gives
  // the name away.
  function mask(text, title) {
    if (!text) return '';
    const words = GTP.norm(title).split(' ').filter(w => w.length > 2);
    let out = text;
    words.forEach(w => {
      const re = new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\w*', 'gi');
      out = out.replace(re, '\u2588\u2588\u2588');
    });
    return out;
  }
  function skeleton(title) {
    return title.replace(/[A-Za-z0-9]/g, '_').replace(/ /g, '   ');
  }
  function initials(title) {
    return title.split(/\s+/)
      .map(w => { const m = w.match(/[A-Za-z0-9]/); return m ? m[0].toUpperCase() : ''; })
      .filter(Boolean).join('.\u2009');
  }

  // Progressive hints (cryptic -> specific), one revealed per wrong guess.
  function buildHints(g) {
    const hints = [];
    const cat = g.category || (g.categories && g.categories[0]) || '';
    if (cat) hints.push(['Genre', mask(cat, g.title)]);
    if (g.year) hints.push(['Released', String(g.year)]);
    if (g.developer) hints.push(['Developer', mask(g.developer, g.title)]);
    const pub = g.publisher && GTP.norm(g.publisher) !== GTP.norm(g.developer || '') ? g.publisher : '';
    if (pub) hints.push(['Publisher', mask(pub, g.title)]);
    const letters = g.title.replace(/[^A-Za-z0-9]/g, '').length;
    hints.push(['Title', skeleton(g.title) + '   \u2014 initials ' + initials(g.title) + '  (' + letters + ' letters)']);
    return hints;
  }

  GTPEngine.createGame({
    mode: 'guessgame',
    title: 'Guess the Game',
    maxGuesses: MAX,
    // Needs a few different screenshots for the reveal to work.
    poolFilter: g => g.images && g.images.screenshots && g.images.screenshots.length >= 2,
    hint: function (g) {
      const letters = g.title.replace(/[^A-Za-z0-9]/g, '').length;
      return 'Title initials: ' + initials(g.title) + '.  (' + letters + ' letters)';
    },
    reveal: function (step, answer, stageEl, cluesEl, done) {
      const shots = answer.images.screenshots || [];
      const total = Math.min(shots.length, MAX);
      const idx = done ? total - 1 : Math.min(step, total - 1);
      const src = shots[idx] || answer.images.hero || answer.images.boxart || '';
      if (img.getAttribute('src') !== src) {
        img.style.opacity = '0';
        img.onload = () => { img.style.opacity = '1'; };
        img.src = src;
      }
      // caption + accumulating hints
      const shownAt = done ? total : (idx + 1);
      const caption = '<div class="clue shotcount"><span class="lbl">\uD83D\uDCF7 Screenshot</span>' +
        shownAt + ' of ' + total + '</div>';
      const hints = buildHints(answer);
      const nHints = done ? hints.length : Math.min(step, hints.length);
      const hintHtml = hints.slice(0, nHints).map(([lbl, txt]) =>
        '<div class="clue"><span class="lbl">' + lbl + '</span>' + GTPEngine.escapeHtml(txt) + '</div>'
      ).join('');
      cluesEl.innerHTML = caption + hintHtml;
    },
  });
})();
</script>
