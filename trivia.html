<style>
  #setup { margin:0 0 14px; }
  .tvseg { display:grid; grid-template-columns:1fr 1fr; gap:8px; max-width:340px; margin:0 auto 10px; }
  .tvseg-btn { padding:9px 12px; border:1px solid var(--stroke); border-radius:var(--radius); background:var(--bg-elev);
    color:var(--text-dim); font-weight:700; cursor:pointer; font-size:14px; }
  .tvseg-btn.on { background:var(--xbox-green-bright); color:#062406; border-color:transparent; }
  .diffrow { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin:0 0 8px; }
  .diffrow.dimmed { opacity:.45; }
  .chip.diffchip { padding:6px 11px; border:1px solid var(--stroke); border-radius:999px; background:var(--bg-elev);
    color:var(--text-dim); font-weight:600; font-size:12.5px; cursor:pointer; }
  .chip.diffchip.on { background:rgba(155,240,11,.16); color:var(--xbox-green-bright); border-color:var(--xbox-green-bright); }
  .lifepip { opacity:.8; font-size:11px; }
  .diffnote { color:var(--text-dim); margin-top:2px; }

  #hud { display:flex; justify-content:space-between; align-items:center; gap:10px; margin:0 0 12px;
    font-size:15px; color:var(--text-dim); }
  #hud b { color:var(--xbox-green-bright); font-size:19px; }
  .tvlives { font-size:20px; color:#ff5252; letter-spacing:2px; }

  .tvcard { border:1px solid var(--stroke); border-radius:var(--radius); background:var(--bg-elev); padding:20px 18px; }
  .tvtype { display:inline-block; font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
    color:var(--xbox-green-bright); background:rgba(155,240,11,.12); padding:4px 10px; border-radius:999px; margin-bottom:12px; }
  .tvprompt { font-size:21px; line-height:1.35; margin:0 0 18px; }
  .tvprompt b { color:#fff; }
  .tvchoices { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:520px){ .tvchoices{ grid-template-columns:1fr; } }
  .tvchoice { position:relative; text-align:left; padding:13px 14px 13px 40px; font-size:15px; min-height:48px;
    display:flex; align-items:center; }
  .tvkey { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:20px; height:20px; border-radius:5px;
    background:rgba(255,255,255,.08); color:var(--text-dim); font-size:11px; font-weight:800; display:grid; place-items:center; }
  .tvchoice.right { background:rgba(46,204,64,.22) !important; border-color:#2ecc40 !important; color:#eafff0 !important; }
  .tvchoice.wrong { background:rgba(255,65,54,.20) !important; border-color:#ff4136 !important; color:#ffeaea !important; }
  .tvchoice:focus-visible { outline:3px solid var(--xbox-green-bright); outline-offset:2px; }

  .tvgrid { font-size:30px; letter-spacing:5px; margin:12px 0; }

  /* OG + Gears themes inherit the base card look; just soften the accent. */
  body.og-theme .tvseg-btn.on, body.og-theme .tvchoice.right { filter:none; }
</style>
