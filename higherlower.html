<style>
  .versus { display:grid; grid-template-columns:1fr 64px 1fr; gap:10px; align-items:stretch; }
  @media (max-width:520px){ .versus{ grid-template-columns:1fr; } .vs{ order:0; } }
  .vcard { position:relative; border:1px solid var(--stroke); border-radius:var(--radius); overflow:hidden; background:#000; min-height:220px; display:flex; flex-direction:column; }
  .vcard .art { flex:1; background-size:cover; background-position:center; min-height:150px; }
  .vcard .cap { padding:12px; background:var(--bg-elev); }
  .vcard .cap h3 { margin:0 0 3px; font-size:16px; }
  .vcard .cap .sub { color:var(--text-dim); font-size:12px; }
  .vcard .score { font-size:34px; font-weight:800; color:var(--xbox-green-bright); text-align:center; padding:6px 0; }
  .vcard .qmark { font-size:34px; font-weight:800; color:var(--text-dim); text-align:center; padding:6px 0; }
  .vs { display:grid; place-items:center; font-weight:800; color:var(--text-dim); font-size:18px; }
  .hlbtns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
  .streakbar { text-align:center; margin:8px 0 14px; font-size:15px; }
  .streakbar b { color:var(--xbox-green-bright); font-size:20px; }

<script>
(async function () {
  await GTP.load();
  const S = GTPEngine.getSettings();
  const mode = 'higherlower';
  GTPEngine.applyTheme(S);
  const HINT_BUDGET = GTPEngine.difficulty(S).hints;
  GTP.hints.init(mode, HINT_BUDGET);

  let pool = GTP.pool(S)
    .filter(g => typeof g.criticScore === 'number' && g.criticScore > 0 && g.images && (g.images.hero || g.images.boxart));
  if (pool.length < 4 && !S.og) pool = GTP.filter('current', null)
    .filter(g => typeof g.criticScore === 'number' && g.criticScore > 0 && g.images && (g.images.hero || g.images.boxart));

  const board = document.getElementById('board');
  const controls = document.getElementById('controls');

  if (pool.length < 4) {
    board.innerHTML = '<div class="panel center">Critic scores aren\'t loaded yet.<br>' +
      '<span class="small">Run <code>scripts/enrich_igdb.py --games</code> to enable this mode.</span></div>';
    return;
  }
  const seed = (function () {
    let h = 2166136261 >>> 0; const s = mode + '|' + GTP.todayKey();
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
    return h >>> 0;
  })();
  const rnd = S.daily ? GTP.mulberry32(seed) : GTP.mulberry32(GTP.randSeed());

  function pick(exclude) {
    if (!S.daily) return GTP.rng.pick(mode, pool, null, exclude ? [exclude.id] : []);
    let g, tries = 0;
    do { g = pool[Math.floor(rnd() * pool.length)]; tries++; }
    while (exclude && g.id === exclude.id && tries < 50);
    return g;
  }

  let left = pick(null), right = pick(left);
  let streak = 0, done = false;
  document.getElementById('best').textContent = GTP.streak.best(mode);

  function art(g) { return g.images.hero || g.images.boxart; }

  function render(revealRight) {
    board.innerHTML =
      '<div class="versus">' +
      card(left, true) +
      '<div class="vs">VS</div>' +
      card(right, revealRight) +
      '</div>';
  }
  function card(g, reveal) {
    return '<div class="vcard">' +
      '<div class="art" style="background-image:url(\'' + (art(g) || '') + '\')"></div>' +
      '<div class="cap"><h3>' + GTPEngine.escapeHtml(g.title) + '</h3>' +
      '<div class="sub">' + [GTPEngine.escapeHtml(g.developer), g.year || ''].filter(Boolean).join(' • ') + '</div>' +
      (reveal ? '<div class="score">' + g.criticScore + '</div>' : '<div class="qmark">?</div>') +
      '</div></div>';
  }

  function renderControls() {
    controls.innerHTML =
      '<div class="hlbtns">' +
      '<button class="btn" id="lowerBtn">▼ Lower</button>' +
      '<button class="btn primary" id="higherBtn">▲ Higher</button>' +
      '</div><div class="small center" style="margin-top:8px">Is <b>' +
      GTPEngine.escapeHtml(right.title) + '</b> rated higher or lower than <b>' +
      GTPEngine.escapeHtml(left.title) + '</b> (' + left.criticScore + ')?</div>' +
      '<div class="btnrow" style="margin-top:10px;justify-content:center"><button class="btn hintbtn" id="hintBtn" type="button"></button></div>';
    document.getElementById('higherBtn').onclick = () => guess('higher');
    document.getElementById('lowerBtn').onclick = () => guess('lower');
    updateHintBtn();
  }

  function updateHintBtn() {
    const b = document.getElementById('hintBtn'); if (!b) return;
    if (HINT_BUDGET === 0) { b.style.display = 'none'; return; }
    const a = GTP.hints.available(mode);
    const left = GTP.hints.left(mode);
    b.disabled = !a; b.classList.toggle('locked', !a);
    b.innerHTML = a ? ('💡 Hint' + (left > 1 ? ' (' + left + ')' : '')) : ('🔒 ' + GTP.hints.needed(mode));
    b.title = a ? ('Reveal the mystery score\u2019s range (' + left + ' left, refreshes every 10 in a row)')
      : ('Hint refreshes after ' + GTP.hints.needed(mode) + ' more correct in a row');
    b.onclick = function () {
      if (done) return;
      if (!GTP.hints.available(mode)) { GTPEngine.toast('🔒 Hint locked — win ' + GTP.hints.needed(mode) + ' more in a row'); updateHintBtn(); return; }
      const lo = Math.floor(right.criticScore / 10) * 10;
      hintBox.innerHTML = '<span class="lbl">💡 Hint</span>' + GTPEngine.escapeHtml(right.title) + '\u2019s score is in the ' + lo + 's';
      hintBox.classList.remove('hidden');
      GTP.hints.use(mode); updateHintBtn();
    };
  }

  function guess(dir) {
    if (done) return;
    const correct = (right.criticScore >= left.criticScore) ? 'higher' : 'lower';
    render(true);
    // Daily Gauntlet: a single question, then report + advance.
    if (window.GTPGauntlet && GTPGauntlet.active()) {
      done = true;
      controls.innerHTML = '';
      const ok = dir === correct;
      GTP.stats.record(mode, ok, ok ? 1 : 0);
      const res = document.getElementById('result');
      res.innerHTML = '<div class="result"><h2>' + (ok ? '\u2705 Correct' : '\u274C Missed') + '</h2>' +
        '<div class="ans">' + GTPEngine.escapeHtml(right.title) + ' scored ' + right.criticScore +
        ' vs ' + GTPEngine.escapeHtml(left.title) + ' ' + left.criticScore + '</div>' +
        '<div class="btnrow" style="margin-top:14px"></div></div>';
      res.classList.remove('hidden');
      if (window.GTP && GTP.reveal) GTP.reveal.attach(res, right);
      GTPGauntlet.onResult({ mode: mode, solved: ok, score: ok ? 100 : 0 });
      return;
    }
    if (dir === correct) {
      streak = GTP.streak.win(mode);
      document.getElementById('streak').textContent = streak;
      document.getElementById('best').textContent = GTP.streak.best(mode);
      setTimeout(() => {
        left = right; right = pick(left);
        hintBox.classList.add('hidden'); hintBox.innerHTML = '';
        render(false); renderControls();
      }, 900);
    } else {
      end();
    }
  }

  function end() {
    done = true;
    controls.innerHTML = '';
    GTP.stats.record(mode, streak > 0, streak);
    GTP.streak.recordBest(mode, streak);
    GTP.streak.reset(mode);
    document.getElementById('best').textContent = GTP.streak.best(mode);

    const res = document.getElementById('result');
    res.innerHTML = '<div class="result"><h2>💥 Streak ended</h2>' +
      '<div class="ans">You got ' + streak + ' right</div>' +
      '<div class="meta">' + GTPEngine.escapeHtml(right.title) + ' scored ' + right.criticScore +
      ' vs ' + GTPEngine.escapeHtml(left.title) + ' ' + left.criticScore + '</div>' +
      '<div class="btnrow" style="margin-top:14px">' +
      '<button class="btn" id="shareBtn">📤 Share</button>' +
      (S.daily ? '' : '<button class="btn" id="againBtn">🔄 Again</button>') +
      '<a class="btn primary" href="index.html">🏠 More modes</a></div></div>';
    res.classList.remove('hidden');
    if (window.GTP && GTP.reveal) GTP.reveal.attach(res, right);
    document.getElementById('shareBtn').onclick = () => {
      const who = (window.GTPProfile && GTPProfile.name()) ? '  (' + GTPProfile.name() + ')' : '';
      const txt = 'Passle — Higher/Lower #' + GTP.dayNumber() + who + '\n🎯 Streak: ' + streak + '\n' + location.href.split('?')[0];
      if (navigator.share) navigator.share({ text: txt }).catch(() => c(txt)); else c(txt);
      function c(t){ navigator.clipboard.writeText(t).then(()=>GTPEngine.toast('Copied!')).catch(()=>GTPEngine.toast(t)); }
    };
    const ab = document.getElementById('againBtn');
    if (ab) ab.onclick = () => location.reload();
  }

  const hintBox = document.createElement('div');
  hintBox.className = 'hintbox hidden'; hintBox.id = 'hint';
  board.parentNode.insertBefore(hintBox, board);

  render(false);
  renderControls();
})();
</script>
