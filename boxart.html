<script>
(async function () {
  await GTP.load();
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  stage.appendChild(canvas);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  let loaded = false;

  // pixelation level per remaining guess (higher blocks = blurrier)
  const LEVELS = [8, 14, 22, 34, 55, 90, 0]; // last = full clarity on reveal

  function draw(step, done) {
    if (!loaded) return;
    const W = canvas.width = img.naturalWidth;
    const H = canvas.height = img.naturalHeight;
    if (done) { ctx.imageSmoothingEnabled = true; ctx.drawImage(img, 0, 0, W, H); return; }
    const blocks = LEVELS[Math.min(step, LEVELS.length - 2)];
    const w = Math.max(1, blocks), h = Math.max(1, Math.round(blocks * H / W));
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(img, 0, 0, w, h);
    ctx.drawImage(canvas, 0, 0, w, h, 0, 0, W, H);
  }

  GTPEngine.createGame({
    mode: 'boxart',
    title: 'Box Art',
    maxGuesses: 6,
    poolFilter: g => g.images && g.images.boxart,
    reveal: function (step, answer, stageEl, cluesEl, done) {
      if (img.src !== answer.images.boxart) {
        loaded = false;
        img.onload = () => { loaded = true; draw(step, done); };
        img.onerror = () => { stageEl.innerHTML = '<div class="small center" style="padding:20px">Image unavailable — skip this one.</div>'; };
        img.src = answer.images.boxart;
      } else {
        draw(step, done);
      }
    },
  });
})();
</script>
