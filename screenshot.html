<script>
(async function () {
  await GTP.load();
  const stage = document.getElementById('stage');
  const img = document.createElement('img');
  img.crossOrigin = 'anonymous';
  // Crop-reveal wants a sharp image that always fills the frame (no
  // letterboxing while zoomed) and a smooth zoom-out between guesses.
  img.style.objectFit = 'cover';
  img.style.transition = 'transform .65s cubic-bezier(.22,.61,.36,1)';
  img.style.willChange = 'transform';
  stage.appendChild(img);

  // Progressive zoom-OUT crop: start cropped into one region of a single
  // screenshot, then reveal more of the frame with each guess. The starting
  // crop is deliberately not too tight (a 5x zoom showed a near-unreadable
  // sliver), and the final reveal shows the WHOLE screenshot uncropped.
  const ZOOM = [3.4, 2.8, 2.3, 1.85, 1.5, 1.2, 1];

  // Always the same screenshot for a given answer (first landscape shot),
  // so the crop genuinely "zooms out" instead of swapping pictures. Box art is
  // deliberately excluded — its portrait aspect crops badly under object-fit
  // cover, which was the "cropping isn't right" bug.
  function shotFor(answer) {
    const shots = (answer.images.screenshots || []);
    return shots[0] || answer.images.hero || '';
  }

  // Deterministic focus point per game => everyone sees the same crop, and
  // it lands on a different spot from game to game. Kept in the 30%..70% band so
  // the tight early crop never sits on a black edge or letterbox bar.
  function focusFor(answer) {
    const s = String(answer.id || answer.title || '');
    let h = 2166136261;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    h >>>= 0;
    const fx = 30 + (h % 41);              // 30%..70%
    const fy = 30 + ((h >> 8) % 41);       // 30%..70%
    return { fx, fy };
  }

  GTPEngine.createGame({
    mode: 'screenshot',
    title: 'Screenshot',
    maxGuesses: 6,
    poolFilter: g => g.images && ((g.images.screenshots && g.images.screenshots.length) || g.images.hero),
    reveal: function (step, answer, stageEl, cluesEl, done) {
      const src = shotFor(answer);
      if (img.src !== src) img.src = src || '';
      if (done) {
        // Reveal the full screenshot, uncropped, regardless of its aspect ratio.
        img.style.objectFit = 'contain';
        img.style.transformOrigin = '50% 50%';
        img.style.transform = 'scale(1)';
      } else {
        const { fx, fy } = focusFor(answer);
        const z = ZOOM[Math.min(step, ZOOM.length - 1)];
        img.style.objectFit = 'cover';
        img.style.transformOrigin = fx + '% ' + fy + '%';
        img.style.transform = 'scale(' + z + ')';
      }
      img.style.filter = 'none';
    },
  });
})();
</script>
