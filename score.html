<script>
(async function () {
  await GTP.load();
  const S = GTPEngine.getSettings();
  const mode = 'score';
  GTPEngine.applyTheme(S);
  const HINT_BUDGET = GTPEngine.difficulty(S).hints;
  GTP.hints.init(mode, HINT_BUDGET);

  let pool = GTP.pool(S)
    .filter(g => typeof g.criticScore === 'number' && g.criticScore > 0 && g.images && (g.images.hero || g.images.boxart));
  if (pool.length < 4 && !S.og) pool = GTP.filter('current', null)
    .filter(g => typeof g.criticScore === 'number' && g.criticScore > 0 && g.images && (g.images.hero || g.images.boxart));

  const board = document.getElementById('board');
  const controls = document.getElementById('controls');

  if (pool.length < 4) {
    board.innerHTML = '<div class="panel center">Critic scores aren\'t loaded yet.<br>' +
      '<span class="small">Run <code>scripts/enrich_igdb.py --games</code> to enable this mode.</span></div>';
    return;
  }

  const seed = (function () {
    let h = 2166136261 >>> 0; const s = mode + '|' + GTP.todayKey();
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
    return h >>> 0;
  })();
  const rnd = S.daily ? GTP.mulberry32(seed) : GTP.mulberry32(GTP.randSeed());

  let streak = 0, done = false, cur = null, threshold = 0;
  document.getElementById('best').textContent = GTP.streak.best(mode);

  function next() {
    cur = S.daily ? pool[Math.floor(rnd() * pool.length)] : GTP.rng.pick(mode, pool);
    if (typeof hintBox !== 'undefined' && hintBox) { hintBox.classList.add('hidden'); hintBox.innerHTML = ''; }
    // threshold within +/-12 of true score, clamped, never equal
    let t;
    do { t = cur.criticScore + Math.round((rnd() * 24) - 12); } while (t === cur.criticScore);
    threshold = Math.max(30, Math.min(97, t));
    if (threshold === cur.criticScore) threshold += (cur.criticScore > 50 ? -1 : 1);
    render();
    renderControls();
  }

  function render(reveal) {
    board.innerHTML =
      '<div class="scorecard">' +
      '<div class="art" style="background-image:url(\'' + (cur.images.hero || cur.images.boxart) + '\')"></div>' +
      '<div class="cap"><h3>' + GTPEngine.escapeHtml(cur.title) + '</h3>' +
      '<div class="sub">' + [GTPEngine.escapeHtml(cur.developer), cur.year || ''].filter(Boolean).join(' • ') + '</div></div></div>' +
      (reveal ? '<div class="reveal" style="color:var(--xbox-green-bright)">' + cur.criticScore + '</div>'
              : '<div class="threshold">Critic score vs <b>' + threshold + '</b></div>');
  }

  function renderControls() {
    controls.innerHTML =
      '<div class="hlbtns">' +
      '<button class="btn" id="belowBtn">▼ Below ' + threshold + '</button>' +
      '<button class="btn primary" id="aboveBtn">▲ Above ' + threshold + '</button>' +
      '</div>' +
      '<div class="btnrow" style="margin-top:10px;justify-content:center"><button class="btn hintbtn" id="hintBtn" type="button"></button></div>';
    document.getElementById('aboveBtn').onclick = () => guess('above');
    document.getElementById('belowBtn').onclick = () => guess('below');
    updateHintBtn();
  }

  function updateHintBtn() {
    const b = document.getElementById('hintBtn'); if (!b) return;
    if (HINT_BUDGET === 0) { b.style.display = 'none'; return; }
    const a = GTP.hints.available(mode);
    const left = GTP.hints.left(mode);
    b.disabled = !a; b.classList.toggle('locked', !a);
    b.innerHTML = a ? ('💡 Hint' + (left > 1 ? ' (' + left + ')' : '')) : ('🔒 ' + GTP.hints.needed(mode));
    b.title = a ? ('Reveal this game\u2019s score range (' + left + ' left, refreshes every 10 in a row)')
      : ('Hint refreshes after ' + GTP.hints.needed(mode) + ' more correct in a row');
    b.onclick = function () {
      if (done) return;
      if (!GTP.hints.available(mode)) { GTPEngine.toast('🔒 Hint locked — win ' + GTP.hints.needed(mode) + ' more in a row'); updateHintBtn(); return; }
      const lo = Math.floor(cur.criticScore / 10) * 10;
      hintBox.innerHTML = '<span class="lbl">💡 Hint</span>' + GTPEngine.escapeHtml(cur.title) + '\u2019s score is in the ' + lo + 's';
      hintBox.classList.remove('hidden');
      GTP.hints.use(mode); updateHintBtn();
    };
  }

  function guess(dir) {
    if (done) return;
    const correct = cur.criticScore > threshold ? 'above' : 'below';
    render(true);
    controls.innerHTML = '';
    // Daily Gauntlet: a single question, then report + advance.
    if (window.GTPGauntlet && GTPGauntlet.active()) {
      done = true;
      const ok = dir === correct;
      GTP.stats.record(mode, ok, ok ? 1 : 0);
      const res = document.getElementById('result');
      res.innerHTML = '<div class="result"><h2>' + (ok ? '\u2705 Correct' : '\u274C Missed') + '</h2>' +
        '<div class="ans">' + GTPEngine.escapeHtml(cur.title) + ' scored ' + cur.criticScore + '</div>' +
        '<div class="btnrow" style="margin-top:14px"></div></div>';
      res.classList.remove('hidden');
      if (window.GTP && GTP.reveal) GTP.reveal.attach(res, cur);
      GTPGauntlet.onResult({ mode: mode, solved: ok, score: ok ? 100 : 0 });
      return;
    }
    if (dir === correct) {
      streak = GTP.streak.win(mode);
      document.getElementById('streak').textContent = streak;
      document.getElementById('best').textContent = GTP.streak.best(mode);
      setTimeout(next, 950);
    } else {
      end();
    }
  }

  function end() {
    done = true;
    GTP.stats.record(mode, streak > 0, streak);
    GTP.streak.recordBest(mode, streak);
    GTP.streak.reset(mode);
    document.getElementById('best').textContent = GTP.streak.best(mode);

    const res = document.getElementById('result');
    res.innerHTML = '<div class="result"><h2>💥 Streak ended</h2>' +
      '<div class="ans">You got ' + streak + ' right</div>' +
      '<div class="meta">' + GTPEngine.escapeHtml(cur.title) + ' scored ' + cur.criticScore +
      ' (you said ' + (cur.criticScore > threshold ? 'below' : 'above') + ' ' + threshold + ')</div>' +
      '<div class="btnrow" style="margin-top:14px">' +
      '<button class="btn" id="shareBtn">📤 Share</button>' +
      (S.daily ? '' : '<button class="btn" id="againBtn">🔄 Again</button>') +
      '<a class="btn primary" href="index.html">🏠 More modes</a></div></div>';
    res.classList.remove('hidden');
    if (window.GTP && GTP.reveal) GTP.reveal.attach(res, cur);
    document.getElementById('shareBtn').onclick = () => {
      const who = (window.GTPProfile && GTPProfile.name()) ? '  (' + GTPProfile.name() + ')' : '';
      const txt = 'Passle — Guess the Score #' + GTP.dayNumber() + who + '\n🎯 Streak: ' + streak + '\n' + location.href.split('?')[0];
      if (navigator.share) navigator.share({ text: txt }).catch(() => c(txt)); else c(txt);
      function c(t){ navigator.clipboard.writeText(t).then(()=>GTPEngine.toast('Copied!')).catch(()=>GTPEngine.toast(t)); }
    };
    const ab = document.getElementById('againBtn');
    if (ab) ab.onclick = () => location.reload();
  }

  const hintBox = document.createElement('div');
  hintBox.className = 'hintbox hidden'; hintBox.id = 'hint';
  board.parentNode.insertBefore(hintBox, board);

  next();
})();
</script>
